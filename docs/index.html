      <style>
        .zmz-globalLoading {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: #fff;
          z-index: 99;
          display: flex;
          align-items: center;
          flex-direction: column;
          justify-content: center;
        }

        .zmz-globalLoading__img {
          margin-bottom: 50px;
          width: 100px;
          height: 100px;
        }

        .zmz-globalLoading__img img {
          width: 100%;
          height: 100%;
          display: block;
          border: 0;
        }

        .zmz-globalLoading__tag {
          height: 80px;
          width: 80px;
          position: relative;
        }

        .zmz-globalLoading__title {
          margin-top: 50px;
          font-weight: bold;
          font-size: 20px;
        }

        .zmz-globalLoading__tag span {
          border: 0;
          margin: 0;
          width: 30px;
          height: 30px;
          position: absolute;
          border-radius: 50%;
          animation: spin 2s ease infinite
        }

        .zmz-globalLoading__tag span:first-child {
          background: #19A68C;
          animation-delay: -1.5s
        }

        .zmz-globalLoading__tag span:nth-child(2) {
          background: #F63D3A;
          animation-delay: -1s
        }

        .zmz-globalLoading__tag span:nth-child(3) {
          background: #FDA543;
          animation-delay: -0.5s
        }

        .zmz-globalLoading__tag span:last-child {
          background: #193B48
        }

        @keyframes spin {

          0%,
          100% {
            transform: translate(0)
          }

          25% {
            transform: translate(160%)
          }

          50% {
            transform: translate(160%, 160%)
          }

          75% {
            transform: translate(0, 160%)
          }
        }
      </style>
